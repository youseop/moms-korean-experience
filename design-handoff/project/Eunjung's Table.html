<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Eunjung's Table — Home</title>
<link rel="stylesheet" href="design-system.css?v=4"/>
<link rel="stylesheet" href="directions.css?v=4"/>
<style>.reveal { opacity: 1; transform: none; }</style>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Serif+Display:ital@0;1&family=Instrument+Serif:ital@0;1&display=swap">
<style>
  /* Hero title font swap (driven by data-hero-font on <html>) */
  [data-hero-font="fraunces-italic"] .hero__title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-variation-settings: "opsz" 144, "SOFT" 50, "WONK" 1;
    letter-spacing: -0.02em;
  }
  [data-hero-font="fraunces-roman"] .hero__title {
    font-family: 'Fraunces', serif;
    font-style: normal;
    font-weight: 500;
    font-variation-settings: "opsz" 144, "SOFT" 50;
    letter-spacing: -0.025em;
  }
  [data-hero-font="playfair"] .hero__title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  [data-hero-font="dm-serif"] .hero__title {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  [data-hero-font="instrument"] .hero__title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.015em;
  }
</style>
<style>
  /* Page wrapper so the mobile experience reads as a single narrow column on desktop.
     We wrap <#root> in .page via inline styling below so components stay simple. */
  html { background: #2a1f14; }  /* color of "outside the page" on desktop */
  body { background: #2a1f14; }
  #root { display: block; }

  /* Form fields */
  .input {
    width: 100%;
    font-family: var(--sans);
    font-size: var(--body);
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--divider);
    padding: 0.6rem 0.1rem;
    border-radius: 0;
    outline: none;
    transition: border-color 180ms ease;
    -webkit-appearance: none;
    appearance: none;
    resize: vertical;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: color-mix(in oklab, var(--muted) 80%, transparent); }

  /* Selection */
  ::selection { background: var(--accent-wash); color: var(--heading); }

  /* Focus ring */
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 3px; }
</style>
</head>
<body>
  <div class="page" id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App scripts (order matters) -->
  <script type="text/babel" src="content.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="tweaks.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
