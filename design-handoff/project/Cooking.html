<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Cook with Mom — Eunjung's Table</title>
<link rel="stylesheet" href="design-system.css?v=5"/>
<link rel="stylesheet" href="directions.css?v=5"/>
<style>.reveal { opacity: 1; transform: none; }</style>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Serif+Display:ital@0;1&family=Instrument+Serif:ital@0;1&display=swap">
<style>
  html, body { background: #2a1f14; }
  [data-hero-font="fraunces-italic"] .hero__title { font-family: 'Fraunces', serif; font-style: italic; font-variation-settings: "opsz" 144, "SOFT" 50, "WONK" 1; letter-spacing: -0.02em; }
  [data-hero-font="fraunces-roman"] .hero__title  { font-family: 'Fraunces', serif; font-style: normal; font-weight: 500; font-variation-settings: "opsz" 144, "SOFT" 50; letter-spacing: -0.025em; }
  [data-hero-font="playfair"]      .hero__title   { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 500; letter-spacing: -0.01em; }
  [data-hero-font="dm-serif"]      .hero__title   { font-family: 'DM Serif Display', serif; font-style: italic; font-weight: 400; letter-spacing: -0.02em; }
  [data-hero-font="instrument"]    .hero__title   { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; letter-spacing: -0.015em; }

  /* Cooking accent — section numbers a little warmer, buttery */
  .section__number { color: color-mix(in oklab, var(--accent) 50%, #b07d3c 50%); }

  /* A little food-y badge on the hero ribbon */
  .ribbon {
    margin: 2rem 0 0;
    padding: 1rem 1.5rem;
    background: var(--surface);
    border-top: 1px solid var(--divider);
    border-bottom: 1px solid var(--divider);
    font-family: var(--script);
    font-size: 1.25rem;
    color: var(--accent-dark);
    text-align: center;
  }

  ::selection { background: var(--accent-wash); color: var(--heading); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 3px; }
</style>
</head>
<body>
  <div class="page" id="root" data-screen-label="Cooking"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="content.jsx"></script>
  <script type="text/babel" src="detail-content.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="detail-components.jsx"></script>
  <script type="text/babel" src="tweaks.jsx"></script>
  <script type="text/babel" src="detail-layout.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    const C = COOKING_CONTENT;

    function CookingPage() {
      const [lightbox, setLightbox] = useState(null);

      return (
        <DetailLayout activeLink="cooking">
          <SubNav items={C.subnav} />

          <DetailHero hero={C.hero} />

          <div className="ribbon reveal" style={{ margin: '1rem 0 0' }}>
            &ldquo;The pot&rsquo;s already on. Come on in.&rdquo;
          </div>

          <FactStrip items={C.facts} />

          <RecipeTabs
            menus={C.menus}
            id="menus"
            eyebrow="Three set menus"
            heading="Pick one. She&rsquo;ll shop for it."
          />

          <IngredientsGrid
            items={C.ingredients}
            id="ingredients"
            eyebrow="In her pantry"
            heading="The flavors everything starts with."
          />

          <NoteStrip>
            Allergies, religious needs, aversions &mdash; tell her when you book. She builds around you.
          </NoteStrip>

          <Timeline
            id="flow"
            eyebrow="How the afternoon goes"
            heading="Three unhurried hours."
            items={C.flow}
          />

          <Pullquote text={C.quote.text} cite={C.quote.cite} />

          <Reviews items={C.reviews} id="reviews" />

          <FAQ items={C.faq} id="faq" />

          <DetailGallery items={C.gallery} onOpen={setLightbox} />

          <CrossSell current="cooking" />

          <DetailClose />

          <Lightbox item={lightbox} onClose={() => setLightbox(null)} />
          <FloatingCTA label="Book a class" />
        </DetailLayout>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CookingPage />);
  </script>
</body>
</html>
